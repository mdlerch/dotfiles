# --- Terminal ---
set -g default-terminal "tmux-256color"
# Disable alternate screen so output from less/man stays in scrollback history
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
# Enable true color (RGB) passthrough for tmux-256color terminals
set -ga terminal-overrides ",tmux-256color:RGB"
# Low escape-time for responsive Neovim mode switching
set-option -sg escape-time 10
# Pass focus events through to Neovim (enables autoread on pane focus)
set -g focus-events on

# --- Prefix ---
# Use C-a instead of the default C-b (more ergonomic, screen-style)
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# --- General options ---
set -g mouse on
set -g visual-bell off
set -g base-index 1           # start window numbering at 1 (matches keyboard)
set -g pane-base-index 1      # start pane numbering at 1
set -g renumber-windows on    # close a window and remaining windows renumber automatically
set-window-option -g mode-keys vi
setw -g monitor-activity on
# aggressive-resize: use the smallest client size only when multiple clients
# are viewing the same window (not just the same session)
setw -g aggressive-resize on

# --- Key bindings: windows ---
unbind ,
bind , command-prompt 'rename-window %%'
bind c new-window -c "#{pane_current_path}"   # new window inherits current path
bind o new-window -c "$HOME"                  # new window at home

# next/prev window — multiple bindings for different muscle memory contexts
bind n next-window     \; display-panes
bind b previous-window \; display-panes
bind H select-window -t -1
bind L select-window -t +1
bind Left  previous-window \; display-panes
bind Right next-window     \; display-panes

unbind p
bind p last-window     \; display-panes   # jump back to previously active window
bind r rotate-window   \; display-panes

# jump directly to window by number
bind 1 select-window -t 1 \; display-panes
bind 2 select-window -t 2 \; display-panes
bind 3 select-window -t 3 \; display-panes
bind 4 select-window -t 4 \; display-panes
bind 5 select-window -t 5 \; display-panes
bind 6 select-window -t 6 \; display-panes
bind 7 select-window -t 7 \; display-panes
bind 8 select-window -t 8 \; display-panes
bind 9 select-window -t 9 \; display-panes

# --- Key bindings: panes ---
bind v split-window -h -c "#{pane_current_path}"   # vertical split
bind s split-window -v -c "#{pane_current_path}"   # horizontal split
bind m resize-pane -Z                               # zoom/maximize current pane

# vim-style pane navigation
bind h select-pane -L \; display-panes
bind j select-pane -D \; display-panes
bind k select-pane -U \; display-panes
bind l select-pane -R \; display-panes

# --- Status bar ---
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=colour232,fg=colour115"
set -g status-left        '#H   '
set -g status-left-length  50
set -g status-right-length 60
set -g status-right        'Sesh: #S'

setw -g window-status-format         " #F#I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-separator      ""
setw -g window-status-style          "fg=colour238,bg=colour232"
setw -g window-status-last-style     "fg=colour246,bg=colour232"
setw -g window-status-bell-style     "fg=colour115,bg=colour232"
setw -g window-status-current-style  "fg=colour123,bg=colour232"
set-window-option -g window-status-activity-style "fg=colour131,bg=colour232"

# --- Pane appearance ---
set -g pane-border-style        "fg=colour238,bg=colour238"
set -g pane-active-border-style "fg=colour45,bg=colour45"
set -g display-panes-colour        "colour238"
set -g display-panes-active-colour "colour45"

# --- Window naming ---
setw -g automatic-rename on
